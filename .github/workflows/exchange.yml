name: exchange

on:
  pull_request:
    paths:
      - 'services/exchange/**'
      - 'pkg/**'
      - 'go.work'
      - 'go.work.sum'
      - 'docker/Dockerfile'
      - '.github/workflows/exchange.yml'
      - '.github/workflows/_service.yml'
  push:
    branches: [main]
    paths:
      - 'services/exchange/**'
      - 'pkg/**'
      - 'go.work'
      - 'go.work.sum'
      - 'docker/Dockerfile'
      - '.github/workflows/exchange.yml'
      - '.github/workflows/_service.yml'

jobs:
  pipeline:
    uses: ./.github/workflows/_service.yml
    with:
      service: exchange
    permissions:
      contents: read
      packages: write
