name: CI

on:
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/bank/go.mod
      - name: Check gofmt
        run: test -z "$(gofmt -l services/ pkg/)"

  lint:
    name: Lint check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - pkg/proto
          - services/bank
          - services/exchange
          - services/gateway
          - services/notification
          - services/user
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4
          working-directory: ${{ matrix.module }}

  proto-check:
    name: Proto staleness check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate protos
        run: make proto
      - name: Check for diff
        run: |
          if ! git diff --exit-code pkg/proto/; then
            echo "::error::Generated proto code is out of date. Run 'make proto' and commit the result."
            exit 1
          fi

  build:
    name: Build services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [bank, exchange, gateway, notification, user]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
      - working-directory: services/${{ matrix.service }}
        run: go build ./...

  tests-unit:
    name: Tests (unit)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [bank, exchange, gateway, notification, user]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
      - working-directory: services/${{ matrix.service }}
        run: go test -race -count=1 ./...

  schema-check:
    name: Schema+seed check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Apply schema
        run: psql -f scripts/db/schema.sql
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
      - name: Apply seed
        run: psql -f scripts/db/seed.sql
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka

  test-integration:
    name: Tests (integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/bank/go.mod
      - name: Apply schema
        run: psql -f scripts/db/schema.sql
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
      - name: Apply seed
        run: psql -f scripts/db/seed.sql
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://banka:banka_secret@localhost:5432/banka?sslmode=disable
          ACCESS_JWT_SECRET: ci-test-access-secret
          REFRESH_JWT_SECRET: ci-test-refresh-secret
        run: |
          for s in services/*/; do
            echo ">>> integration tests in $s"
            (cd "$s" && go test -race -count=1 -tags=integration ./...) || exit 1
          done

  docker-build:
    name: Docker build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user, notification, gateway, bank, exchange]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
