name: user

on:
  pull_request:
    paths:
      - 'services/user/**'
      - 'pkg/**'
      - 'go.work'
      - 'go.work.sum'
      - 'docker/Dockerfile'
      - '.github/workflows/user.yml'
      - '.github/workflows/_service.yml'
  push:
    branches: [main]
    paths:
      - 'services/user/**'
      - 'pkg/**'
      - 'go.work'
      - 'go.work.sum'
      - 'docker/Dockerfile'
      - '.github/workflows/user.yml'
      - '.github/workflows/_service.yml'

jobs:
  pipeline:
    uses: ./.github/workflows/_service.yml
    with:
      service: user
    permissions:
      contents: read
      packages: write
