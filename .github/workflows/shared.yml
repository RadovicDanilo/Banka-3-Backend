name: shared

on:
  pull_request:
    paths:
      - 'proto/**'
      - 'pkg/**'
      - 'scripts/db/**'
      - 'scripts/proto/**'
      - 'services/**'
      - 'go.work'
      - 'go.work.sum'
      - 'Makefile'
      - '.github/workflows/shared.yml'
  push:
    branches: [main]
    paths:
      - 'proto/**'
      - 'pkg/**'
      - 'scripts/db/**'
      - 'scripts/proto/**'
      - 'services/**'
      - 'go.work'
      - 'go.work.sum'
      - 'Makefile'
      - '.github/workflows/shared.yml'

jobs:
  proto-staleness:
    name: proto staleness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: make proto
      - name: Diff
        run: |
          if ! git diff --exit-code pkg/proto/; then
            echo "::error::Generated proto code is out of date. Run 'make proto' and commit."
            exit 1
          fi

  pkg-fmt:
    name: gofmt (pkg/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/logger/go.mod
      - run: test -z "$(gofmt -l pkg/)"

  pkg-proto-tidy:
    name: go mod tidy (pkg/proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/proto/go.mod
      - working-directory: pkg/proto
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  pkg-logger-tidy:
    name: go mod tidy (pkg/logger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/logger/go.mod
      - working-directory: pkg/logger
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  pkg-proto-lint:
    name: golangci-lint (pkg/proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/proto/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4
          working-directory: pkg/proto

  pkg-logger-lint:
    name: golangci-lint (pkg/logger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/logger/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4
          working-directory: pkg/logger

  schema-check:
    name: schema + seed
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Apply schema
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -f scripts/db/schema.sql
      - name: Apply seed
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -f scripts/db/seed.sql

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/bank/go.mod
      - name: Apply schema
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -f scripts/db/schema.sql
      - name: Apply seed
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -f scripts/db/seed.sql
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://banka:banka_secret@localhost:5432/banka?sslmode=disable
          ACCESS_JWT_SECRET: ci-test-access-secret
          REFRESH_JWT_SECRET: ci-test-refresh-secret
        run: |
          for s in services/*/; do
            echo ">>> integration tests in $s"
            (cd "$s" && go test -race -count=1 -tags=integration ./...) || exit 1
          done
