name: shared

on:
  pull_request:
  push:
    branches: [main]

jobs:
  proto-staleness:
    name: proto staleness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: make proto
      - name: Diff
        run: |
          if ! git diff --exit-code pkg/proto/; then
            echo "::error::Generated proto code is out of date. Run 'make proto' and commit."
            exit 1
          fi

  workspace-integrity:
    name: go.work integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - name: Verify go.work covers all modules
        run: |
          go work use -r .
          git diff --exit-code go.work

  pkg-fmt:
    name: gofmt (pkg/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - run: test -z "$(gofmt -s -l pkg/)"

  pkg-tidy:
    name: go mod tidy (pkg/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - working-directory: pkg
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  pkg-lint:
    name: golangci-lint (pkg/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4
          working-directory: pkg

  schema-check:
    name: schema + seed
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Apply schema
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -f scripts/db/schema.sql
      - name: Apply seed
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -v admin_email=admin@banka.raf -v client_email=petar@primer.raf -f scripts/db/seed.sql

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/bank/go.mod
      - name: Apply schema
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -f scripts/db/schema.sql
      - name: Apply seed
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -v admin_email=admin@banka.raf -v client_email=petar@primer.raf -f scripts/db/seed.sql
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://banka:banka_secret@localhost:5432/banka?sslmode=disable
          ACCESS_JWT_SECRET: ci-test-access-secret
          REFRESH_JWT_SECRET: ci-test-refresh-secret
        run: |
          for s in services/*/; do
            echo ">>> integration tests in $s"
            (cd "$s" && go test -race -count=1 -tags=integration ./...) || exit 1
          done
