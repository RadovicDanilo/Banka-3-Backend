syntax = "proto3";

package user;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/pkg/proto/user";

// Login
message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  repeated string permissions = 3;
  string role = 4;
}

// Logout
message LogoutRequest {
  string email = 1;
}

message LogoutResponse {
  bool success = 1;
}

// Refresh
message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  repeated string permissions = 3;
  string role = 4;
}

// Token validation
message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string sub = 1;
  int64 iat = 2;
  int64 exp = 3;
  repeated string permissions = 4;
  string role = 5;
}

// Permissions
message GetUserPermissionsRequest {
  string email = 1;
}

message GetUserPermissionsResponse {
  string role = 1;
  repeated string permissions = 2;
}

// User identification
message GetUserByIdRequest {
  int64 id = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

// Password actions
message PasswordActionRequest {
  string email = 1;
}

message PasswordActionResponse {
  bool accepted = 1;
}

message SetPasswordWithTokenRequest {
  string token = 1;
  string new_password = 2;
}

message SetPasswordWithTokenResponse {
  bool successful = 1;
}
