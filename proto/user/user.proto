syntax = "proto3";

package user;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/pkg/proto/user";

import "user/auth.proto";
import "user/client.proto";
import "user/employee.proto";

service UserService {
  // Auth services
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc ValidateAccessToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ValidateRefreshToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc RequestPasswordReset(PasswordActionRequest) returns (PasswordActionResponse);
  rpc RequestInitialPasswordSet(PasswordActionRequest) returns (PasswordActionResponse);
  rpc SetPasswordWithToken(SetPasswordWithTokenRequest) returns (SetPasswordWithTokenResponse);
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (GetUserPermissionsResponse);

  // Client services
  rpc GetClientById(GetUserByIdRequest) returns (GetClientResponse);
  rpc GetClientByEmail(GetUserByEmailRequest) returns (GetClientResponse);
  rpc CreateClientAccount(CreateClientRequest) returns (CreateClientResponse);
  rpc GetClients(GetClientsRequest) returns (GetClientsResponse);
  rpc UpdateClient(UpdateClientRequest) returns (UpdateClientResponse);

  // Employee services
  rpc GetEmployeeById(GetUserByIdRequest) returns (GetEmployeeResponse);
  rpc GetEmployeeByEmail(GetUserByEmailRequest) returns (GetEmployeeResponse);
  rpc GetEmployees(GetEmployeesRequest) returns (GetEmployeesResponse);
  rpc UpdateEmployee(UpdateEmployeeRequest) returns (GetEmployeeResponse);
  rpc UpdateEmployeeTradingLimit(UpdateEmployeeTradingLimitRequest) returns (GetEmployeeResponse);
  rpc UpdateEmployeeNeedApproval(UpdateEmployeeNeedApprovalRequest) returns (GetEmployeeResponse);
  rpc GetActuaries(GetEmployeesRequest) returns (GetEmployeesResponse);
  rpc DeleteEmployee(DeleteEmployeeRequest) returns (DeleteEmployeeResponse);
  rpc CreateEmployeeAccount(CreateEmployeeRequest) returns (GetEmployeeResponse);
}
