syntax = "proto3";

package trading;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/gen/trading";

service TradingService {
  rpc ListExchanges(ListExchangesRequest) returns (ListExchangesResponse);
  rpc ListListings(ListListingsRequest) returns (ListListingsResponse);
  rpc GetListing(GetListingRequest) returns (GetListingResponse);
  rpc ListListingHistory(ListListingHistoryRequest) returns (ListListingHistoryResponse);
  rpc ListForexPairs(ListForexPairsRequest) returns (ListForexPairsResponse);
  rpc ListOptionDates(ListOptionDatesRequest) returns (ListOptionDatesResponse);
  rpc ListOptions(ListOptionsRequest) returns (ListOptionsResponse);
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc ApproveOrder(ApproveOrderRequest) returns (ApproveOrderResponse);
  rpc DeclineOrder(DeclineOrderRequest) returns (DeclineOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc SetExchangeOpenOverride(SetExchangeOpenOverrideRequest) returns (SetExchangeOpenOverrideResponse);
}

message Exchange {
  int64 id = 1;
  string name = 2;
  string acronym = 3;
  string mic_code = 4;
  string polity = 5;
  string currency = 6;
  string time_zone_offset = 7;
  bool open_override = 8;
  // Local-time working hours as "HH:MM:SS" (Postgres TIME). Clients that only
  // care about HH:MM can truncate.
  string open_time = 9;
  string close_time = 10;
}

// Supervisor-only (gated at the gateway by `secured("supervisor")`; the
// trading server re-checks against employee_permissions). Flips the
// exchange's open_override flag — when true, IsOpen returns true regardless
// of the clock, which lets us exercise the trading flow outside real market
// hours.
message SetExchangeOpenOverrideRequest {
  int64 exchange_id = 1;
  bool open_override = 2;
  string caller_email = 3;
}

message SetExchangeOpenOverrideResponse {
  Exchange exchange = 1;
}

message ListExchangesRequest {}

message ListExchangesResponse {
  repeated Exchange exchanges = 1;
}

// Listing carries denormalized instrument identity (ticker/name/type) and
// server-derived analytics fields alongside the row itself so that clients
// do not need to join or compute anything. security_type is either "stock"
// or "future" — the listings table only references those two. Futures-only
// fields (settlement_date_unix, contract_size) are 0 for stock listings.
message Listing {
  int64 id = 1;
  int64 exchange_id = 2;
  int64 stock_id = 3;
  int64 future_id = 4;
  int64 price = 5;
  int64 ask_price = 6;
  int64 bid_price = 7;
  int64 last_refresh_unix = 8;
  string ticker = 9;
  string name = 10;
  string security_type = 11;
  int64 volume = 12;
  int64 change = 13;
  int64 settlement_date_unix = 14;
  int64 contract_size = 15;
  int64 maintenance_margin = 16;
  int64 initial_margin_cost = 17;
  int64 market_cap = 18;
  int64 nominal_value = 19;
  string exchange_acronym = 20;
}

// Filters applied server-side. Zero-valued numeric bounds mean "unbounded"
// — e.g. price_min=0 and price_max=0 disables the price filter entirely.
// settlement_from_unix / settlement_to_unix apply only to future listings;
// passing them filters out all stock listings.
message ListListingsRequest {
  string caller_email = 1;
  string exchange_prefix = 2;
  string search = 3;
  int64 price_min = 4;
  int64 price_max = 5;
  int64 ask_min = 6;
  int64 ask_max = 7;
  int64 bid_min = 8;
  int64 bid_max = 9;
  int64 volume_min = 10;
  int64 volume_max = 11;
  int64 settlement_from_unix = 12;
  int64 settlement_to_unix = 13;
  // sort_by: "price" | "volume" | "maintenance_margin". Empty = id asc.
  string sort_by = 14;
  // sort_order: "asc" | "desc". Empty defaults to "asc".
  string sort_order = 15;
}

message ListListingsResponse {
  repeated Listing listings = 1;
}

message GetListingRequest {
  int64 id = 1;
  string caller_email = 2;
}

message GetListingResponse {
  Listing listing = 1;
}

// period: "day" | "week" | "month" | "year" | "5y" | "all". Anything else
// rejected with InvalidArgument.
message ListListingHistoryRequest {
  int64 listing_id = 1;
  string period = 2;
  string caller_email = 3;
}

message ListingHistoryPoint {
  int64 date_unix = 1;
  int64 price = 2;
  int64 ask_price = 3;
  int64 bid_price = 4;
  int64 change = 5;
  int64 volume = 6;
}

message ListListingHistoryResponse {
  repeated ListingHistoryPoint points = 1;
}

// Forex is employee-only — clients get PermissionDenied. Spec Idea 1: forex
// pairs have no listings, we surface them directly.
message ForexPair {
  int64 id = 1;
  string ticker = 2;
  string name = 3;
  string base_currency = 4;
  string quote_currency = 5;
  double exchange_rate = 6;
  string liquidity = 7;
  int64 contract_size = 8;
  int64 maintenance_margin = 9;
  int64 nominal_value = 10;
}

message ListForexPairsRequest {
  string caller_email = 1;
}

message ListForexPairsResponse {
  repeated ForexPair pairs = 1;
}

// Options attach to stocks directly (spec "Idea 1" — no options listings).
// Actuaries (employees) only; clients get PermissionDenied. Dates and grid
// are split into two calls so the stock detail page can render the expiry
// selector before fetching the grid (spec p.60).
message ListOptionDatesRequest {
  int64 stock_id = 1;
  string caller_email = 2;
}

message OptionDate {
  int64 settlement_date_unix = 1;
  int32 days_to_expiry = 2;
}

message ListOptionDatesResponse {
  repeated OptionDate dates = 1;
}

// strikes is the number of rows above AND below the current stock price; the
// response has at most 2*strikes+1 rows. settlement is the expiry to filter
// on, formatted YYYY-MM-DD.
message ListOptionsRequest {
  int64 stock_id = 1;
  string settlement = 2;
  int32 strikes = 3;
  string caller_email = 4;
}

// OptionContract carries the fields rendered in the grid (spec p.60). theta,
// bid, ask and volume are stubbed to 0 until Black-Scholes + an options order
// book are wired (issue #197 explicitly allows stubs). last == premium.
message OptionContract {
  int64 id = 1;
  string ticker = 2;
  string side = 3;
  int64 strike = 4;
  int64 last = 5;
  int64 theta = 6;
  int64 bid = 7;
  int64 ask = 8;
  int64 volume = 9;
  int64 open_interest = 10;
  int64 settlement_date_unix = 11;
}

message OptionGridRow {
  int64 strike = 1;
  OptionContract call = 2;
  OptionContract put = 3;
}

message ListOptionsResponse {
  int64 stock_id = 1;
  string settlement = 2;
  // shared_price is the current stock listing price, rendered once above the
  // grid (spec p.60 "cena akcije iznad tabele").
  int64 shared_price = 3;
  repeated OptionGridRow rows = 4;
}

// Exactly one of listing_id / option_id / forex_pair_id must be set — that's
// the instrument being traded. limit_price / stop_price are required only
// for LIMIT / STOP / STOP_LIMIT; senders must leave them 0 otherwise.
message CreateOrderRequest {
  int64 listing_id = 1;
  int64 option_id = 2;
  int64 forex_pair_id = 3;
  string account_number = 4;
  string order_type = 5;
  string direction = 6;
  int64 quantity = 7;
  int64 limit_price = 8;
  int64 stop_price = 9;
  bool all_or_none = 10;
  bool margin = 11;
}

message CreateOrderResponse {
  int64 order_id = 1;
  string status = 2;
}

// OrderDetail is the row shape used by the supervisor orders portal (spec
// pp.57–58). asset_label is a human-readable instrument identifier: the
// listing's ticker for stocks/futures, the option or forex-pair ticker
// otherwise. placer_name is derived from the placer row (employee or client).
// past_settlement signals "approve blocked, decline only" at the UI layer —
// the RPC re-checks server-side.
message OrderDetail {
  int64 id = 1;
  string status = 2;
  string order_type = 3;
  string direction = 4;
  int64 quantity = 5;
  int64 contract_size = 6;
  int64 price_per_unit = 7;
  int64 remaining_portions = 8;
  string asset_label = 9;
  string placer_name = 10;
  int64 placer_employee_id = 11;
  int64 placer_client_id = 12;
  bool past_settlement = 13;
  int64 approved_by = 14;
  int64 created_at_unix = 15;
  bool margin = 16;
  bool all_or_none = 17;
  int64 commission = 18;
}

// Supervisor-only. status: "" or "all" returns every order, otherwise one of
// "pending|approved|declined|done|cancelled". agent_id filters by the placer's
// employee_id (0 = no filter); client-placed orders are excluded when a
// positive agent_id is passed.
message ListOrdersRequest {
  string caller_email = 1;
  string status = 2;
  int64 agent_id = 3;
}

message ListOrdersResponse {
  repeated OrderDetail orders = 1;
}

message ApproveOrderRequest {
  int64 order_id = 1;
  string caller_email = 2;
}

message ApproveOrderResponse {
  OrderDetail order = 1;
}

message DeclineOrderRequest {
  int64 order_id = 1;
  string caller_email = 2;
}

message DeclineOrderResponse {
  OrderDetail order = 1;
}

// CancelOrder accepts either the order's owner or a supervisor. The caller
// identity comes from the `user-email` gRPC metadata header (same as
// CreateOrder) so the server can distinguish client owner vs. employee owner
// vs. supervisor without an extra DB round trip on the gateway.
message CancelOrderRequest {
  int64 order_id = 1;
}

message CancelOrderResponse {
  OrderDetail order = 1;
}
