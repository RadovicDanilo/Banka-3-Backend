syntax = "proto3";

package bank;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/pkg/proto/bank";

message Account {
  string account_number = 1;
  string account_name = 2;
  int64 owner_id = 3;
  double balance = 4;
  double available_balance = 5;
  int64 employee_id = 6;
  int64 creation_date = 7;
  int64 expiration_date = 8;
  string currency = 9;
  string status = 10;
  string account_type = 11;
  double daily_limit = 12;
  double monthly_limit = 13;
  double daily_spending = 14;
  double monthly_spending = 15;
}

message BusinessInfo {
  string company_name = 1;
  string registration_number = 2;
  string pib = 3;
  string activity_code = 4;
  string address = 5;
}

message CreateAccountRequest {
  int64 client_id = 1;
  string account_type = 2;
  string subtype = 3;
  string currency = 4;
  double initial_balance = 5;
  double daily_limit = 6;
  double monthly_limit = 7;
  bool create_card = 8;
  string card_type = 9;
  string card_brand = 10;
  BusinessInfo business_info = 11;
  string name = 12;
}

message CreateAccountResponse {
  string account_number = 1;
  string account_name = 2;
  int64 owner_id = 3;
  double balance = 4;
  double available_balance = 5;
  int64 employee_id = 6;
  string creation_date = 7;
  string expiration_date = 8;
  string currency = 9;
  string status = 10;
  string account_type = 11;
  double daily_limit = 12;
  double monthly_limit = 13;
  double daily_spending = 14;
  double monthly_spending = 15;
}

message UpdateAccountNameRequest {
  string account_number = 1;
  string name = 2;
}

message UpdateAccountNameResponse {}

message UpdateAccountLimitsRequest {
  string account_number = 1;
  optional int64 daily_limit = 2;
  optional int64 monthly_limit = 3;
}

message UpdateAccountLimitsResponse {}

message ListAccountsRequest {
  string firstName = 1;
  string lastName = 2;
  string account_number = 3;
}

message ListAccountsResponse {
  repeated Account accounts = 1;
}

message GetAccountDetailsRequest {
  string accountNumber = 1;
}

message GetAccountDetailsResponse {
  Account account = 1;
}

message ClientTransaction {
  string from_account = 1;
  string to_account = 2;
  double initial_amount = 3;
  double final_amount = 4;
  double fee = 5;
  string currency = 6;
  string payment_code = 7;
  string reference_number = 8;
  string purpose = 9;
  string status = 10;
  int64 timestamp = 11;
}

message ListClientTranasctionsRequest {
  string account_number = 1;
  string date = 2;
  int64 amount = 3;
  string status = 4;
}

message ListClientTransactionsResponse {
  repeated ClientTransaction transactions = 1;
}

